name: Cat Adoption Tracker

run-name: >
  Cat Adoption Tracker – ${{
    github.event_name == 'repository_dispatch' && 'Scheduled Trigger' ||
    github.event_name == 'workflow_dispatch' && 'Manual Trigger' ||
    github.event_name == 'schedule' && 'GitHub Cron Trigger' ||
    'Unknown Trigger'
  }}

concurrency:
  group: cat-adoption-tracker
  cancel-in-progress: true

on:
  workflow_dispatch:
  repository_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO_1: ${{ secrets.EMAIL_TO_1 }}
      EMAIL_TO_2: ${{ secrets.EMAIL_TO_2 }}

      MAX_WORKERS: "8"
      REQUEST_DELAY: "0.2"

    steps:
      - name: Log start time
        run: echo "::notice::Workflow started at $(date -u)"

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          echo "::group::Installing dependencies"
          pip install -r requirements.txt
          echo "::endgroup::"

      - name: Run all scrapers
        run: |
          echo "::group::Running scrapers"
          python run_all.py
          echo "::endgroup::"

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add *.json
          git diff --cached --quiet || git commit -m "Update cat data"
          git push

      - name: Log end time
        run: echo "::notice::Workflow ended at $(date -u)"