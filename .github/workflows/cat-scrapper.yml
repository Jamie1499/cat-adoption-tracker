name: Run BlueCross tracker

on:
  schedule:
    - cron: "0,15,30,45 * * * *"
  workflow_dispatch: {}

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright
          python -m playwright install --with-deps

      - name: Fetch sitemaps with Playwright
        env:
          URL: "https://www.bluecross.org.uk/sitemap.xml"
          OUT_DIR: "sitemaps"
          HEADFUL: "0"
          NAV_TIMEOUT_MS: "180000"
        run: |
          python fetch_all_sitemaps_playwright.py

      - name: Run tracker
        env:
          # point the tracker at all files in sitemaps/ (comma-separated)
          SITEMAP_FILES: sitemaps/sitemap.xml,sitemaps/sitemap.xml__page_1,sitemaps/sitemap.xml__page_2
          DEBUG: "0"
          SAVE_HTML_SAMPLES: "0"
          NO_EMAIL: "0"                      # set to 1 to disable email
          MAX_WORKERS: "6"
          REQUEST_DELAY: "0.4"
          USER_AGENT: "github-actions-bluecross-tracker/1.0"
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO_1: ${{ secrets.EMAIL_TO_1 }}
          EMAIL_TO_2: ${{ secrets.EMAIL_TO_2 }}
        run: |
          python bluecross-tracker.py

      - name: Commit results if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bluecross_cats.json || true
          if ! git diff --cached --quiet; then
            git commit -m "Update bluecross_cats.json (action run)"
            git push
          else
            echo "No changes to commit"
          fi
