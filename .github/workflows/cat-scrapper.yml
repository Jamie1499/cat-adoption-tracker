name: Cat Adoption Tracker

run-name: >
  Cat Adoption Tracker – ${{
    github.event_name == 'repository_dispatch' && 'Scheduled Trigger' ||
    github.event_name == 'workflow_dispatch' && 'Manual Trigger' ||
    github.event_name == 'schedule' && 'GitHub Cron Trigger' ||
    'Unknown Trigger'
  }}

concurrency:
  group: cat-adoption-tracker
  cancel-in-progress: true

on:
  workflow_dispatch:
  repository_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # --- Startup diagnostics ---
      - name: Log start time
        run: echo "::notice::Workflow started at $(date -u)"

      # --- Checkout repository (Node 24 native) ---
      - name: Checkout code
        uses: actions/checkout@v5

      # --- Set up Python (Node 24 native) ---
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # --- Cache pip dependencies ---
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # --- Install dependencies ---
      - name: Install dependencies
        run: |
          echo "::group::Installing dependencies"
          pip install -r requirements.txt
          echo "::endgroup::"

      # --- Run all scrapers ---
      - name: Run all scrapers
        run: |
          echo "::group::Running scrapers"
          python run-all.py
          echo "::endgroup::"

      # --- Commit updated JSON files ---
      - name: Commit updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add *.json
          git diff --cached --quiet || git commit -m "Update cat data"
          git push

      # --- End time ---
      - name: Log end time
        run: echo "::notice::Workflow ended at $(date -u)"