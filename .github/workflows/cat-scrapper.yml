name: Cat Adoption Tracker

run-name: >
  Cat Adoption Tracker – ${{
    github.event_name == 'repository_dispatch' && 'Scheduled Trigger' ||
    github.event_name == 'workflow_dispatch' && 'Manual Trigger' ||
    github.event_name == 'schedule' && 'GitHub Cron Trigger' ||
    'Unknown Trigger'
  }}

concurrency:
  group: cat-adoption-tracker
  cancel-in-progress: true

on:
  workflow_dispatch:
  repository_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run all scrapers
        env:
          DEBUG: 0
          SAVE_HTML_SAMPLES: 0
          NO_EMAIL: 0
          MAX_WORKERS: 8
          REQUEST_DELAY: 0.02

          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO_1: ${{ secrets.EMAIL_TO_1 }}
          EMAIL_TO_2: ${{ secrets.EMAIL_TO_2 }}

        run: python run-all.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add *.json
          git commit -m "Update cat JSON" || echo "No changes"
          git push