name: Blue Cross Cat Tracker (debug)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  track-bluecross:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run Blue Cross tracker (debug)
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO_1: ${{ secrets.EMAIL_TO_1 }}
          EMAIL_TO_2: ${{ secrets.EMAIL_TO_2 }}
          DEBUG: "1"
          SAVE_HTML_SAMPLES: "10"
          FORCE_TEST: "0"
        run: python bluecross-tracker.py

      - name: Upload debug HTML (optional)
        if: always()
        run: |
          echo "Saved debug HTML files (if any) to debug_html/"
          ls -la debug_html || echo "No debug_html directory"
